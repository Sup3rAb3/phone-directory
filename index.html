<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLP Directory</title>
  <style>
    :root {
      /* Restored Color Palette */
      --grad-start: rgb(2, 3, 129);
      --grad-end: #0a0c4d;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --accent: #60a5fa;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      background-attachment: fixed;
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding-top: 20px;
    }

    h1 { font-size: 34px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; text-align: center; }

    /* Modern Search Bar */
    .search-wrapper {
      position: sticky;
      top: 10px;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }

    input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 14px 20px;
      color: white;
      font-size: 17px;
      outline: none;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.5); }

    /* iOS List Grouping */
    .dept-section {
      background: var(--glass-bg);
      border-radius: 16px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .dept-header {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 18px;
    }

    .chevron {
      transition: transform 0.3s ease;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .dept-section.active .chevron { transform: rotate(180deg); }

    .dept-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
      border-top: 1px solid var(--border);
    }

    .dept-section.active .dept-content {
      max-height: 3000px; /* Increased height for full list */
      transition: max-height 0.4s ease-in-out;
    }

    /* Employee Item Row */
    .employee-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .employee-item:last-child { border-bottom: none; }

    .emp-name { font-weight: 500; font-size: 16px; display: block; margin-bottom: 2px; }
    .emp-info { font-size: 14px; color: var(--text-secondary); }
    .emp-link { color: var(--accent); text-decoration: none; display: block; margin-top: 4px; font-size: 14px; }

    #noResults { text-align: center; margin-top: 40px; color: var(--text-secondary); display: none; }
  </style>
</head>
<body>

    function render() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('directory');
      container.innerHTML = "";

      const grouped = {};
      employees.forEach(emp => {
        if (!grouped[emp.department]) grouped[emp.department] = [];
        const match = emp.name.toLowerCase().includes(keyword) || 
                      emp.department.toLowerCase().includes(keyword) ||
                      emp.extension.includes(keyword);
        if (match) grouped[emp.department].push(emp);
      });

      let hasResults = false;
      Object.keys(grouped).sort().forEach(dept => {
        if (grouped[dept].length === 0) return;
        hasResults = true;

        const section = document.createElement('div');
        section.className = `dept-section ${keyword ? 'active' : ''}`;
        
        section.innerHTML = `
          <div class="dept-header">
            <span>${dept}</span>
            <span class="chevron">▼</span>
          </div>
          <div class="dept-content">
            ${grouped[dept].map(emp => `
              <div class="employee-item">
                <span class="emp-name">${emp.name}</span>
                <span class="emp-info">Ext: ${emp.extension}</span>
                ${emp.email ? `<a href="mailto:${emp.email}" class="emp-link">${emp.email}</a>` : ''}
              </div>
            `).join('')}
          </div>
        `;

        section.querySelector('.dept-header').addEventListener('click', () => {
          section.classList.toggle('active');
        });

        container.appendChild(section);
      });

      document.getElementById('noResults').style.display = hasResults ? 'none' : 'block';
    }

    document.getElementById('searchInput').addEventListener('input', render);
    render();
  </script>
</body>
</html>
