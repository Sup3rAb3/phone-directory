<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Corporate Directory</title>
  <style>
    :root {
      --grad-start: rgb(2, 3, 129);
      --grad-end: #0a0c4d;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --accent: #60a5fa;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      background-attachment: fixed;
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 600px; margin: 0 auto; padding-top: 20px; }

    /* Logo Styling */
    .logo-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; }
    .logo { max-height: 60px; width: auto; }

    /* Company Switcher Tabs */
    .switcher { display: flex; background: var(--glass-bg); padding: 4px; border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border); }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 8px; font-weight: 600; transition: all 0.3s ease; color: var(--text-secondary); }
    .tab.active { background: var(--accent); color: white; }

    h1 { font-size: 34px; font-weight: 700; margin-bottom: 20px; text-align: center; }

    .search-wrapper { position: sticky; top: 10px; z-index: 10; background: var(--glass-bg); backdrop-filter: blur(20px); border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border); }
    input { width: 100%; background: transparent; border: none; padding: 14px 20px; color: white; font-size: 17px; outline: none; }
    input::placeholder { color: rgba(255, 255, 255, 0.5); }

    /* Dropdown Styles */
    .dept-section { background: var(--glass-bg); border-radius: 16px; margin-bottom: 16px; backdrop-filter: blur(10px); border: 1px solid var(--border); overflow: hidden; }
    .dept-header { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 18px; }
    .chevron { transition: transform 0.3s ease; color: var(--text-secondary); font-size: 14px; }
    .dept-section.active .chevron { transform: rotate(180deg); }
    .dept-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0, 1, 0, 1); border-top: 1px solid var(--border); }
    .dept-section.active .dept-content { max-height: 3000px; transition: max-height 0.4s ease-in-out; }

    .employee-item { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .employee-item:last-child { border-bottom: none; }
    .emp-name { font-weight: 500; display: block; margin-bottom: 2px; }
    .emp-info { font-size: 14px; color: var(--text-secondary); }
    .emp-link { color: var(--accent); text-decoration: none; display: block; margin-top: 4px; font-size: 14px; }
    #noResults { text-align: center; margin-top: 40px; color: var(--text-secondary); display: none; }
  </style>
</head>

    ];

    let currentCompany = 'CLP';

    function setCompany(comp) {
      currentCompany = comp;
      // Toggle Tab UI
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${comp}`).classList.add('active');
      render();
    }

    function render() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const container = document.getElementById('directory');
      container.innerHTML = "";

      // 1. Get ALL matches across companies
      const allMatches = employees.filter(e => 
        e.name.toLowerCase().includes(keyword) || 
        e.extension.includes(keyword) || 
        e.department.toLowerCase().includes(keyword)
      );

      // 2. Logic: If matches exist in "other" company but not "current", auto-switch
      if (keyword.length > 0) {
        const hasMatchesInCurrent = allMatches.some(e => e.company === currentCompany);
        const firstMatchInOther = allMatches.find(e => e.company !== currentCompany);
        
        if (!hasMatchesInCurrent && firstMatchInOther) {
          setCompany(firstMatchInOther.company);
          return; // Exit render, setCompany will trigger a fresh render
        }
      }

      // 3. Render filtered items for the active company
      const filtered = allMatches.filter(e => e.company === currentCompany);
      const grouped = {};
      filtered.forEach(emp => {
        if (!grouped[emp.department]) grouped[emp.department] = [];
        grouped[emp.department].push(emp);
      });

      let hasResults = false;
      Object.keys(grouped).sort().forEach(dept => {
        hasResults = true;
        const section = document.createElement('div');
        section.className = `dept-section ${keyword ? 'active' : ''}`;
        
        section.innerHTML = `
          <div class="dept-header">
            <span>${dept}</span>
            <span class="chevron">▼</span>
          </div>
          <div class="dept-content">
            ${grouped[dept].map(e => `
              <div class="employee-item">
                <span class="emp-name">${e.name}</span>
                <span class="emp-info">Ext: ${e.extension}</span>
                ${e.email ? `<a href="mailto:${e.email}" class="emp-link">${e.email}</a>` : ''}
              </div>
            `).join('')}
          </div>
        `;

        section.querySelector('.dept-header').addEventListener('click', () => {
          section.classList.toggle('active');
        });

        container.appendChild(section);
      });

      document.getElementById('noResults').style.display = (hasResults || keyword === "") ? 'none' : 'block';
    }

    document.getElementById('searchInput').addEventListener('input', render);
    render();
  </script>
